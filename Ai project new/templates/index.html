<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Ultra Mode</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron',sans-serif;
}

body{
    background:black;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:0;
}

.chat{
    width:900px;
    height:600px;
    background:rgba(0,10,30,0.85);
    backdrop-filter:blur(15px);
    border-radius:30px;
    padding:30px;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 120px rgba(0,255,255,0.4);
    position:relative;
    z-index:2;
}

.header{
    text-align:center;
    font-size:28px;
    color:#00eaff;
    text-shadow:0 0 20px #00ffff;
    margin-bottom:15px;
}

.messages{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:20px;
}

.messages::-webkit-scrollbar{width:6px}
.messages::-webkit-scrollbar-thumb{
    background:linear-gradient(#00ffff,#7b2ff7);
    border-radius:10px;
}

.msg{
    padding:15px 25px;
    border-radius:30px;
    max-width:65%;
    min-width:120px;
    word-wrap:break-word;
    animation:slide 0.4s ease;
    white-space: pre-line;   /* FIX XUỐNG DÒNG */
}

@keyframes slide{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
}

.bot{
    align-self:flex-start;
    background:linear-gradient(90deg,#00f0ff,#0066ff);
    box-shadow:0 0 25px #00f0ff;
}

.user{
    align-self:flex-end;
    background:linear-gradient(90deg,#ff00cc,#6600ff);
    box-shadow:0 0 25px #ff00cc;
}

.input-area{
    display:flex;
    gap:15px;
}

input{
    flex:1;
    padding:15px;
    border-radius:30px;
    border:none;
    outline:none;
    background:#111;
    color:white;
    box-shadow:0 0 20px #00eaff inset;
}

button{
    padding:15px 30px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    background:linear-gradient(90deg,#00eaff,#7b2ff7);
    color:white;
    font-weight:bold;
    transition:0.2s;
}

button:active{
    transform:scale(0.85);
    box-shadow:0 0 60px #00ffff;
}

.shock{
    position:fixed;
    border-radius:50%;
    border:2px solid #00ffff;
    pointer-events:none;
    animation:shockAnim 0.8s ease-out forwards;
}

@keyframes shockAnim{
    from{width:10px;height:10px;opacity:1}
    to{width:500px;height:500px;opacity:0}
}

.credit{
    position:absolute;
    bottom:10px;
    right:20px;
    font-size:14px;
    color:#00eaff;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="chat">
    <div class="header">⚡ AI ULTRA MODE</div>
    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input type="text" id="input" placeholder="Nhập tin nhắn...">
        <button onclick="sendMessage()">Gửi</button>
    </div>
</div>

<div class="credit">by nhan10011</div>

<script>
/* ===== STAR BACKGROUND ===== */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<200;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        d:Math.random()*1
    });
}

function drawStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";

    stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();

        s.y+=s.d;
        if(s.y>canvas.height){
            s.y=0;
            s.x=Math.random()*canvas.width;
        }
    });

    requestAnimationFrame(drawStars);
}
drawStars();

/* ===== CHAT KẾT NỐI FLASK ===== */
const input=document.getElementById("input");
const messages=document.getElementById("messages");

function addMessage(text,type){
    const div=document.createElement("div");
    div.className="msg "+type;
    div.innerHTML=text;   // vẫn dùng innerHTML để hiển thị ảnh/video
    messages.appendChild(div);
    messages.scrollTop=messages.scrollHeight;
}

function sendMessage(){
    const text=input.value.trim();
    if(!text) return;

    addMessage(text,"user");
    input.value="";

    fetch("/chat",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({message:text})
    })
    .then(res=>res.json())
    .then(data=>{
        addMessage(data.reply,"bot");
    })
    .catch(err=>{
        addMessage("Lỗi kết nối server.","bot");
        console.error(err);
    });
}

input.addEventListener("keydown",e=>{
    if(e.key==="Enter") sendMessage();
});

/* ===== CLICK EFFECT ===== */
document.addEventListener("click",e=>{
    if(!e.target.closest(".chat")){
        const shock=document.createElement("div");
        shock.className="shock";
        shock.style.left=e.clientX-5+"px";
        shock.style.top=e.clientY-5+"px";
        document.body.appendChild(shock);
        setTimeout(()=>shock.remove(),800);
    }
});
</script>

</body>
</html>
